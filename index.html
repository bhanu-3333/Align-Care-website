<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Align Care - Control Your Waste Aligners</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <img src="./asserts/logo.png" alt="Align Care" class="logo">
            </div>
            <div class="nav-center">
                <a href="#home" class="nav-link active">Home</a>
                <a href="#features" class="nav-link">Features</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
            <div class="nav-right">
                <button class="btn-download-nav">
                    <img src="./asserts/download.png" alt="">
                    Download
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-container">
            
            <!-- Left Side: Phone Image -->
            <div class="hero-left">
                <div class="phone-scene">
                    <!-- Glow Effect -->
                    <div class="glow-backdrop"></div>
                    <!-- Phone Image -->
                    <img src="./asserts/home-page.png" alt="Align Care App" class="phone-image">
                </div>
            </div>

            <!-- Right Side: Content -->
            <div class="hero-right">
                <div class="hero-content">
                    
                    <!-- Badge -->
                    <div class="eco-badge">
                        <img src="./asserts/eco-leaf.png" alt="Eco" class="badge-icon">
                        <span class="badge-text">SUSTAINABLE • SMART • SIMPLE</span>
                    </div>

                    <!-- Heading -->
                    <h1 class="hero-heading">
                        Control<br>
                        your <span class="gradient-word">Waste</span><br>
                        Aligners
                    </h1>

                    <!-- Description -->
                    <p class="hero-description">
                        Track, collect, manage, and recycle aligners through a sustainable digital ecosystem.
                    </p>

                    <!-- CTA Buttons -->
                    <div class="cta-group">
                        <button class="btn-primary">
                            <img src="./asserts/download.png" alt="" class="btn-icon">
                            Download Now
                        </button>
                        <button class="btn-secondary">
                            Explore More
                            <img src="./asserts/arrow_right_alt.png" alt="" class="btn-icon">
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </section>

</body>
</html>
